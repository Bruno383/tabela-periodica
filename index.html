<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela Periódica Completa</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    font-family:Arial;
    color:white;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.tabela{
    display:grid;
    grid-template-columns:repeat(18, 70px);
    gap:5px;
    justify-content:center;
}

.elemento{
    width:70px;
    height:70px;
    border-radius:10px;
    padding:5px;
    box-sizing:border-box;
    transition:0.2s;
    cursor:pointer;
}

.elemento:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px rgba(255,255,255,0.5);
}

.numero{
    font-size:11px;
    text-align:left;
}

.simbolo{
    font-size:22px;
    font-weight:bold;
}

.nome{
    font-size:9px;
}

/* cores */

.nao-metal{ background:#16a34a; }
.gas-nobre{ background:#9333ea; }
.metal-alcalino{ background:#ea580c; }
.metal-alcalino-terroso{ background:#f59e0b; }
.metaloide{ background:#0f766e; }
.halogenio{ background:#dc2626; }
.metal-transicao{ background:#2563eb; }
.lantanideo{ background:#db2777; }
.actinideo{ background:#7c3aed; }

</style>
</head>
<body>

<h1>Tabela Periódica Completa</h1>

<div class="tabela" id="tabela"></div>

<script>

const elementos = [

{n:1,s:"H",nome:"Hidrogênio",c:"nao-metal",col:1,row:1},

const tabela = document.getElementById("tabela");

elementos.forEach(el => {

    const div = document.createElement("div");

    div.className = `elemento ${el.c}`;

    div.style.gridColumn = el.col;
    div.style.gridRow = el.row;

    div.innerHTML = `
        <div class="numero">${el.n}</div>
        <div class="simbolo">${el.s}</div>
        <div class="nome">${el.nome}</div>
    `;

    tabela.appendChild(div);

});

</script>

</body>
</html>
